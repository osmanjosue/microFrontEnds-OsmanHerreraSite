<div class="w-full">
  <form
    [formGroup]="contactForm"
    (ngSubmit)="enviarFormularioContacto()"
    class="form-glass transition-all"
    [class.blur-state]="isSending"
  >
    <div class="form-group">
      <label for="nombre" class="form-label">Nombre / Empresa</label>
      <input
        id="nombre"
        type="text"
        formControlName="nombre"
        class="form-input"
        placeholder="Tu nombre o empresa"
      />
      <span *ngIf="f['nombre'].touched && f['nombre'].errors?.['required']" class="form-error">
        El nombre es obligatorio
      </span>
    </div>

    <div class="form-group">
      <label for="correoElectronico" class="form-label">Correo Electrónico</label>
      <input
        id="correoElectronico"
        type="email"
        formControlName="correoElectronico"
        class="form-input"
        placeholder="tu@email.com"
      />
      <div *ngIf="f['correoElectronico'].touched && f['correoElectronico'].errors">
        <span *ngIf="f['correoElectronico'].errors['required']" class="form-error">
          El correo es obligatorio
        </span>
        <span *ngIf="f['correoElectronico'].errors['pattern']" class="form-error">
          El formato de correo no es válido
        </span>
      </div>
    </div>

    <div class="form-group">
      <label for="content" class="form-label">Mensaje</label>
      <textarea
        id="content"
        formControlName="content"
        class="form-textarea"
        placeholder="Tu mensaje aquí..."
      ></textarea>
      <div *ngIf="f['content'].touched && f['content'].errors">
        <span *ngIf="f['content'].errors['required']" class="form-error">
          El mensaje es obligatorio
        </span>
        <span *ngIf="f['content'].errors['minlength']" class="form-error">
          El mensaje debe tener al menos 10 caracteres
        </span>
      </div>
    </div>

    <p *ngIf="contactForm.invalid && contactForm.touched" class="form-error mb-4">
      ℹ️ Completa correctamente todos los campos
    </p>

    <button
      type="submit"
      [disabled]="contactForm.invalid || isSending"
      class="form-button w-full mb-3"
    >
      <span *ngIf="isSending; else defaultText" class="inline-flex items-center gap-2">
        <span class="inline-block w-4 h-4 border-2 border-transparent border-t-white rounded-full animate-spin"></span>
        Enviando...
      </span>
      <ng-template #defaultText>Enviar Mensaje</ng-template>
    </button>

    <p class="text-xs opacity-70 text-center">
      Responderé lo antes posible
    </p>
  </form>
</div>
